name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        bun-version: ['latest']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install

      - name: Check TypeScript
        run: bun run src/main.ts --version

      - name: Test CLI commands
        run: |
          bun run src/main.ts --help
          bun run src/main.ts doctor
          bun run src/main.ts session list
          bun run src/main.ts model list
          bun run src/main.ts skill list
          bun run src/main.ts mcp list

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64-modern
            artifact: voracode-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: voracode-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: voracode-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: voracode-windows-x64

    runs-on: ${{ matrix.os }}
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} ./src/main.ts --outfile dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 7