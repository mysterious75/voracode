name: Publish
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64-modern
            artifact: voracode-linux-x64
            suffix: ""
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: voracode-darwin-arm64
            suffix: ""
          - os: macos-latest
            target: bun-darwin-x64
            artifact: voracode-darwin-x64
            suffix: ""
          - os: windows-latest
            target: bun-windows-x64
            artifact: voracode-windows-x64
            suffix: ".exe"

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun build --compile --target=${{ matrix.target }} ./src/main.ts --outfile dist/${{ matrix.artifact }}
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
          fail_on_unmatched_files: true